services:
  helix:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - HARNESS_LLM_MODEL=${HARNESS_LLM_MODEL:-claude-3-5-sonnet-latest}
    ports:
      - "${HELIX_PORT:-8006}:8006"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8006/healthz', timeout=2)"]
      interval: 30s
      timeout: 5s
      retries: 3
